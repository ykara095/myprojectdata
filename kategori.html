<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Yönetimi</title>
    <link rel="stylesheet" href="style.css">
    <style>
        
        .navbar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 12px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .navbar a {
            color: #2c3e50;
            
            text-decoration: none;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .navbar a:hover {
            background-color: #ecf0f1;
            
            color: #3498db;
            
        }

        .navbar a.active {
            background-color: #3498db;
            
            color: white;
        }
    </style>
</head>

<body>
    <div class="navbar-wrapper" style="max-width: 1000px; margin: 0 auto;">
        <div class="navbar">
            <a href="main.html">Ürünler</a>
            <a href="kategori.html" class="active">Kategoriler</a>
            <a href="depo.html">Depolar</a>
            <a href="personel.html">Personel</a>
            <a href="tedarik.html">Tedarikçiler</a>
            <a href="stok.html">Stok Hareketleri</a>
        </div>
    </div>

    <div class="container">
        <h1>Kategori Yönetimi</h1>

        <div class="form-group">
            <input type="text" id="kategoriAdi" placeholder="Kategori Adı">
            <input type="text" id="tanim" placeholder="Tanım / Açıklama">
            <button id="kategoriEkleBtn">Kategori Ekle</button>
        </div>

        <input type="text" id="searchInput" class="search-bar" placeholder="Kategorilerde ara...">

        <table>
            <thead>
                <tr>
                    <th style="cursor: pointer;" onclick="siralamaYap('Kategori_ID')">Kategori ID ↕</th>
                    <th>Kategori Adı</th>
                    <th>Tanım / Açıklama</th>
                    <th>İşlemler</th>
                </tr>
            </thead>
            <tbody id="tabloGövdesi">
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>

</html>
