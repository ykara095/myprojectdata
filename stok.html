<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Hareketleri</title>
    <link rel="stylesheet" href="style.css">
    <style>
        
        .navbar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 12px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .navbar a {
            color: #2c3e50;
            
            text-decoration: none;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .navbar a:hover {
            background-color: #ecf0f1;
            
            color: #3498db;
            
        }

        .navbar a.active {
            background-color: #3498db;
            
            color: white;
        }
    </style>
</head>

<body>
    <div class="navbar-wrapper" style="max-width: 1000px; margin: 0 auto;">
        <div class="navbar">
            <a href="main.html">Ürünler</a>
            <a href="kategori.html">Kategoriler</a>
            <a href="depo.html">Depolar</a>
            <a href="personel.html">Personel</a>
            <a href="tedarik.html">Tedarikçiler</a>
            <a href="stok.html" class="active">Stok Hareketleri</a>
        </div>
    </div>

    <div class="container">
        <h1>Stok Hareketleri Takip Günlüğü</h1>

        <div class="form-group">
            <select id="islemTipi">
                <option value="" disabled selected>İşlem Tipi Seçin</option>
                <option value="Giriş">Giriş</option>
                <option value="Çıkış">Çıkış</option>
            </select>
            <input type="number" id="miktar" placeholder="Miktar">
            <input type="number" id="urunId" placeholder="Ürün ID">
            <input type="number" id="depoId" placeholder="Depo ID">
            <input type="number" id="personelId" placeholder="Personel ID">
            <button id="hareketEkleBtn">Hareketi İşle</button>
        </div>

        <input type="text" id="searchInput" class="search-bar" placeholder="Hareket geçmişinde ara...">

        <table>
            <thead>
                <tr>
                    <th style="cursor: pointer;" onclick="siralamaYap('Hareket_ID')">Hareket ID ↕</th>
                    <th>İşlem Tipi</th>
                    <th>Miktar</th>
                    <th style="cursor: pointer;" onclick="siralamaYap('Islem_Tarihi')">İşlem Tarihi ↕</th>
                    <th>Ürün ID</th>
                    <th>Depo ID</th>
                    <th>Personel ID</th>
                    <th>İşlemler</th>
                </tr>
            </thead>
            <tbody id="tabloGövdesi">
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>

</html>
