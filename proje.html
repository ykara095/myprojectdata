<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Stok Yönetimi</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <nav class="sidebar">
            <h2>Stok Kontrol</h2>
            <ul>
                <li><a href="#" class="aktif"><i class="ikon ikon-ev"></i> Panel</a></li>
                <li><a href="#"><i class="ikon ikon-kutu"></i> Ürünler</a></li>
                <li><a href="#"><i class="ikon ikon-depo"></i> Depolar</a></li>
                <li><a href="#"><i class="ikon ikon-hareket"></i> Stok Hareketleri</a></li>
                <li><a href="#"><i class="ikon ikon-personel"></i> Personel</a></li>
            </ul>
        </nav>

        <main class="content">
            <header>
                <h1>Sistem Özeti</h1>
                <div class="kullanici-bilgisi">Hoş geldin, Yönetici</div>
            </header>

            <section class="istatistikler">
                <div class="kart">
                    <h3>Toplam Ürün</h3>
                    <p>1,250</p>
                </div>
                <div class="kart uyari">
                    <h3>Kritik Stok</h3>
                    <p>12 Ürün</p>
                </div>
                <div class="kart">
                    <h3>Aktif Depolar</h3>
                    <p>4</p>
                </div>
            </section>

            <section class="form-alani">
                <h2><i class="fas fa-plus"></i> Yeni Ürün Ekle</h2>
                <form id="urunFormu">
                    <div class="input-grubu">
                        <input type="text" placeholder="Ürün Adı" required>
                        <input type="text" placeholder="Barkod">
                    </div>
                    <div class="input-grubu">
                        <input type="number" placeholder="Birim Fiyat" step="0.01">
                        <select>
                            <option value="">Kategori Seçin</option>
                            <option value="1">Elektronik</option>
                            <option value="2">Gıda</option>
                        </select>
                    </div>
                    <button type="submit" class="buton-ekle">Ürünü Kaydet</button>
                </form>
            </section>
        </main>
    </div>
</body>

</html>
