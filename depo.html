<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depo Yönetimi</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Menü için ek şık tasarım (style.css ile tam uyumlu) */
        .navbar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 12px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .navbar a {
            color: #2c3e50;
            /* var(--primary) rengi */
            text-decoration: none;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .navbar a:hover {
            background-color: #ecf0f1;
            /* var(--light) rengi */
            color: #3498db;
            /* var(--secondary) rengi */
        }

        .navbar a.active {
            background-color: #3498db;
            /* Aktif sayfa vurgusu */
            color: white;
        }
    </style>
</head>

<body>
    <div class="navbar-wrapper" style="max-width: 1000px; margin: 0 auto;">
        <div class="navbar">
            <a href="main.html">Ürünler</a>
            <a href="kategori.html">Kategoriler</a>
            <a href="depo.html" class="active">Depolar</a>
            <a href="personel.html">Personel</a>
            <a href="tedarik.html">Tedarikçiler</a>
            <a href="stok.html">Stok Hareketleri</a>
        </div>
    </div>

    <div class="container">
        <h1>Depo Yönetimi</h1>

        <div class="form-group">
            <input type="text" id="depoAdi" placeholder="Depo Adı">
            <input type="text" id="lokasyonAdres" placeholder="Lokasyon / Adres">
            <input type="number" id="toplamKapasite" placeholder="Toplam Kapasite">
            <button id="depoEkleBtn">Depo Ekle</button>
        </div>

        <input type="text" id="searchInput" class="search-bar" placeholder="Depolarda ara...">

        <table>
            <thead>
                <tr>
                    <th style="cursor: pointer;" onclick="siralamaYap('Depo_ID')">Depo ID ↕</th>
                    <th>Depo Adı</th>
                    <th>Lokasyon / Adres</th>
                    <th style="cursor: pointer;" onclick="siralamaYap('Toplam_Kapasite')">Toplam Kapasite ↕</th>
                    <th>İşlemler</th>
                </tr>
            </thead>
            <tbody id="tabloGövdesi">
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>

</html>
